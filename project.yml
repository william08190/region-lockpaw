name: Lockpaw
options:
  bundleIdPrefix: com.eriknielsen
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

schemes:
  Lockpaw:
    build:
      targets:
        Lockpaw: all
        LockpawTests: [test]
    test:
      targets:
        - LockpawTests

targets:
  Lockpaw:
    type: application
    platform: macOS
    sources:
      - path: Lockpaw
    settings:
      base:
        PRODUCT_NAME: Lockpaw
        PRODUCT_BUNDLE_DISPLAY_NAME: Lockpaw
        INFOPLIST_FILE: Lockpaw/Info.plist
        CODE_SIGN_ENTITLEMENTS: Lockpaw/Lockpaw.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.eriknielsen.lockpaw.debug
          PRODUCT_BUNDLE_DISPLAY_NAME: Lockpaw Debug
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.eriknielsen.lockpaw
    dependencies:
      - package: Sparkle
      - target: LockpawCLI
        embed: true
        copy:
          # SharedSupport, not MacOS — `lockpaw` would collide with the app binary
          # `Lockpaw` on case-insensitive filesystems (DMG/Applications).
          destination: sharedSupport
  LockpawCLI:
    type: tool
    platform: macOS
    sources:
      - path: LockpawCLI
    settings:
      base:
        PRODUCT_NAME: lockpaw
        # Module name must NOT case-collide with the app's `Lockpaw` module — on a
        # case-insensitive filesystem `lockpaw.swiftmodule` and `Lockpaw.swiftmodule`
        # clash and break `@testable import Lockpaw`. Executable stays `lockpaw`.
        PRODUCT_MODULE_NAME: LockpawCLI
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: YES
  LockpawTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: LockpawTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eriknielsen.lockpaw.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Lockpaw.app/Contents/MacOS/Lockpaw"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Lockpaw
