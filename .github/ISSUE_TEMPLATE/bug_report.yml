name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open Lockpaw
        2. Press hotkey to lock
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: dropdown
    id: macos-version
    attributes:
      label: macOS version
      options:
        - macOS 15
        - macOS 14
    validations:
      required: true

  - type: input
    id: lockpaw-version
    attributes:
      label: Lockpaw version
      description: Check Settings or About for the version number.
      placeholder: "1.0.4"
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Any other information, screenshots, or logs.
    validations:
      required: false
