name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve packages
        run: |
          xcodebuild -project Lockpaw.xcodeproj \
            -scheme Lockpaw \
            -resolvePackageDependencies

      - name: Build
        run: |
          set -o pipefail
          xcodebuild -project Lockpaw.xcodeproj \
            -scheme Lockpaw \
            -configuration Debug \
            -destination 'platform=macOS' \
            build 2>&1 | xcbeautify

      - name: Test
        run: |
          set -o pipefail
          xcodebuild -project Lockpaw.xcodeproj \
            -scheme Lockpaw \
            -configuration Debug \
            -destination 'platform=macOS' \
            test 2>&1 | xcbeautify
